<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morningstar — Deployment Config</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e2e8f0;
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .config-card {
    background: #12121a;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 40px;
    width: 460px;
    max-width: 90vw;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: #67E8F9;
    margin-bottom: 4px;
  }
  .sub {
    font-size: 0.75rem;
    color: #6b7280;
    margin-bottom: 28px;
    letter-spacing: 0.04em;
  }
  label {
    display: block;
    font-size: 0.7rem;
    color: #9ca3af;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    background: #1a1a24;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: #e2e8f0;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: rgba(103,232,249,0.3); }
  .actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn-primary {
    flex: 1;
    padding: 10px 20px;
    background: rgba(103,232,249,0.1);
    border: 1px solid rgba(103,232,249,0.2);
    border-radius: 6px;
    color: #67E8F9;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary:hover { background: rgba(103,232,249,0.18); }
  .btn-secondary {
    padding: 10px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    color: #9ca3af;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.06); }
  .status {
    margin-top: 16px;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 0.7rem;
    display: none;
  }
  .status.visible { display: block; }
  .status.success { background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.15); color: #34D399; }
  .status.error { background: rgba(252,165,165,0.08); border: 1px solid rgba(252,165,165,0.15); color: #FCA5A5; }
  .saved-info {
    margin-top: 12px;
    font-size: 0.65rem;
    color: #6b7280;
  }
  .saved-info strong { color: #9ca3af; }
  .test-result {
    margin-top: 8px;
    font-size: 0.65rem;
    display: none;
  }
  .test-result.visible { display: block; }
  .test-result.ok { color: #34D399; }
  .test-result.fail { color: #FCA5A5; }
</style>
</head>
<body>
<div class="config-card">
  <h1>Morningstar</h1>
  <div class="sub">AKSCI — Deployment Configuration</div>
  <label for="backend-url">Backend API URL</label>
  <input type="text" id="backend-url" placeholder="http://localhost:3456">
  <div class="saved-info" id="saved-info">Current: <strong id="current-url">none</strong></div>
  <div class="test-result" id="test-result"></div>
  <div class="status" id="status-msg"></div>
  <div class="actions">
    <button class="btn-secondary" onclick="testConnection()" id="btn-test">Test</button>
    <button class="btn-secondary" onclick="resetConfig()">Reset</button>
    <button class="btn-primary" onclick="saveAndLaunch()" id="btn-launch">Save &amp; Launch</button>
  </div>
</div>
<script>
function getStored() { return localStorage.getItem('morningstar_backend_url'); }
function displayCurrent() {
  var el = document.getElementById('current-url');
  var url = getStored();
  el.textContent = url || 'none';
  document.getElementById('backend-url').value = url || 'http://localhost:3456';
}
displayCurrent();

function showStatus(msg, type) {
  var el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status visible ' + type;
  setTimeout(function(){ el.className = 'status'; }, 4000);
}

function saveAndLaunch() {
  var url = document.getElementById('backend-url').value.trim();
  if (!url) { showStatus('Please enter a backend URL', 'error'); return; }
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    url = 'http://' + url;
  }
  url = url.replace(/\/+$/, '');
  localStorage.setItem('morningstar_backend_url', url);
  showStatus('Saved! Launching dashboard...', 'success');
  displayCurrent();
  setTimeout(function(){ window.location.href = 'dashboard.html'; }, 500);
}

function resetConfig() {
  localStorage.removeItem('morningstar_backend_url');
  displayCurrent();
  showStatus('Configuration reset', 'success');
}

async function testConnection() {
  var url = document.getElementById('backend-url').value.trim();
  var btn = document.getElementById('btn-test');
  var resultEl = document.getElementById('test-result');
  btn.textContent = 'Testing...';
  btn.disabled = true;
  resultEl.className = 'test-result';
  try {
    var res = await fetch(url.replace(/\/+$/, '') + '/api/health');
    if (!res.ok) throw new Error('Status ' + res.status);
    var data = await res.json();
    resultEl.className = 'test-result visible ok';
    resultEl.innerHTML = 'OK — ' + data.graph.nodes + ' nodes, ' + data.graph.edges + ' edges, DB: ' + (data.database || 'json-file');
  } catch (e) {
    resultEl.className = 'test-result visible fail';
    resultEl.textContent = 'Connection failed: ' + e.message;
  }
  btn.textContent = 'Test';
  btn.disabled = false;
}
</script>
</body>
</html>
